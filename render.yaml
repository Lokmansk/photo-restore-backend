services:
  - type: web
    name: photo-restore-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: REPLICATE_API_TOKEN
        sync: false   # Set this manually in Render dashboard (secret)
    autoDeploy: true
